name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cspm
          POSTGRES_PASSWORD: cspm_pass
          POSTGRES_DB: cspm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run linting
        run: |
          pip install flake8 black isort
          flake8 app/ --max-line-length=300 --ignore=F401,E712,E221,F841 --exclude=__pycache__
          # black app/ --check
          # isort app/ --check-only

      - name: Run SAST (bandit)
        run: |
          pip install bandit
          bandit -r app/ -ll -x app/tests

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://cspm:cspm_pass@localhost:5432/cspm_test
          SYNC_DATABASE_URL: postgresql+psycopg2://cspm:cspm_pass@localhost:5432/cspm_test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
          SECRET_KEY: test-secret-key-for-ci-only
          GROQ_API_KEY: ""
          AWS_DEFAULT_REGION: us-east-1
        run: pytest tests/ -v --tb=short --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          fail_ci_if_error: false

  security-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cspm-backend:${{ github.sha }} ./backend

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cspm-backend:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
